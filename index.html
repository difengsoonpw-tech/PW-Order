<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PWDF Wholesale Ordering Portal</title>

<style>
body { font-family: Arial, sans-serif; margin:0; background:#f4f4f4; }
header {
  position: sticky; top: 0;
  background:#fff; padding:12px 20px;
  font-size:20px; font-weight:bold;
  border-bottom:1px solid #ddd;
  z-index: 10;
}
.container { max-width:1200px; margin:auto; padding:12px; }
.item-card {
  background:#fff; padding:12px;
  border-radius:10px; margin-bottom:10px;
  display:grid; grid-template-columns:1fr 260px; gap:10px;
}
.controls { display:flex; gap:6px; align-items:center; }
.qty-box { padding:6px; width:80px; }
.add-btn {
  background:#1678ff; color:white;
  border:none; padding:6px 16px;
  border-radius:6px; cursor:pointer;
}
.add-btn:active { transform: scale(0.95); }

#summaryPanel {
  position: fixed; bottom:0; width:100%;
  background:#fff; padding:12px;
  display:flex; justify-content:space-between;
  border-top:1px solid #ddd;
}
.cart-btn {
  background:#ff6a00; color:white;
  padding:10px 18px;
  border:none; border-radius:8px;
}

#summaryPopup {
  position:fixed; inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}
.summary-box {
  background:#fff;
  width:92%; max-width:700px;
  padding:16px;
  border-radius:10px;
  max-height:85vh; overflow:auto;
}
.close-btn {
  float:right; background:#888;
  color:white; border:none;
  padding:6px 10px;
  border-radius:6px;
}
.item-meta { font-size:12px; color:#666; }
</style>
</head>

<body>

<header>
  PWDF Wholesale Ordering Portal
  <span style="float:right;">Items: <span id="cartCount">0</span></span>
</header>

<div class="container">
  <input id="searchInput"
    type="text"
    placeholder="Search name / code / flavour..."
    style="width:100%; padding:10px;">
</div>

<div id="menuContainer" class="container"></div>

<div id="summaryPanel">
  <div>Items: <span id="cartCountBottom">0</span></div>
  <button id="submitBtn" class="cart-btn">Submit Order</button>
</div>

<div id="summaryPopup">
  <div class="summary-box">
    <button class="close-btn" onclick="closePopup()">Close</button>
    <h3>Order Summary</h3>
    <div id="popupSummary"></div>
    <textarea id="summaryText" style="width:100%; height:120px;"></textarea>
  </div>
</div>

<script srcscript>
</body>
</html>
