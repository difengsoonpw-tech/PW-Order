<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PWDF Wholesale Ordering Portal</title>

<style>
body{
  margin:0; font-family:Arial,sans-serif; background:#f4f4f4;
}
header{
  background:#fff; padding:12px 16px; font-size:20px;
  font-weight:700; border-bottom:1px solid #ddd;
}
.container{ max-width:1200px; margin:auto; padding:12px; }

/* ✅ STICKY SEARCH */
#searchBar{
  position:sticky; top:0; z-index:1000;
  background:#fff; border-bottom:1px solid #ddd;
}
#smartSearchInput{
  width:100%; padding:14px;
  font-size:16px; border:1px solid #ccc;
  border-radius:8px;
}

/* RESULTS */
.item-card{
  background:#fff; padding:14px; border-radius:12px;
  margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,.05);
  display:flex; justify-content:space-between; gap:10px;
}
.item-name{ font-weight:600; font-size:14px; }
.item-meta{ font-size:12px; color:#666; margin-top:4px; }
.controls{ display:flex; align-items:center; gap:8px; }
.qty-box{ padding:8px; width:80px; }
.add-btn{
  background:#1678ff; color:white; border:none;
  padding:10px 14px; border-radius:8px; cursor:pointer;
  min-height:44px;
}
.added{
  background:#2ecc71 !important;
}

/* CART BAR */
#summaryPanel{
  position:fixed; bottom:0; width:100%;
  background:#fff; border-top:1px solid #ddd;
  padding:12px 16px;
  display:flex; justify-content:space-between;
}
.summary-btn{
  background:#ff6a00; color:white;
  padding:12px 18px; border:none;
  border-radius:12px; font-size:16px;
}

/* POPUP */
#summaryPopup{
  display:none; position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.55);
  align-items:center; justify-content:center;
}
.summary-box{
  background:#fff; width:92%;
  max-width:720px; padding:18px;
  border-radius:12px;
}
.form-field label{ font-size:12px; display:block; margin-bottom:4px; }
.form-field input{
  width:100%; padding:10px; margin-bottom:10px;
}
.cart-line{
  display:flex; gap:8px; align-items:center;
  margin-bottom:8px;
}
.cart-line input{ width:70px; padding:6px; }

/* ✅ MOBILE */
@media(max-width:600px){
  .item-card{ flex-direction:column; }
  .controls{ justify-content:flex-start; }
}
</style>
</head>

<body>

<header>
  PWDF Wholesale Ordering Portal
  <span style="float:right;">
    Items: <span id="cartCount">0</span>
  </span>
</header>

<!-- ✅ STICKY SEARCH -->
<div id="searchBar">
  <div class="container">
    <input id="smartSearchInput" placeholder="Search name / code / flavour…">
  </div>
</div>

<div id="menuContainer" class="container"></div>

<div id="summaryPanel">
  <div>Items: <span id="cartCountBottom">0</span></div>
  <button id="submitOrderBtn" class="summary-btn">Review & Submit</button>
</div>

<!-- POPUP -->
<div id="summaryPopup">
  <div class="summary-box">

    <h3>Customer Details</h3>
    <div class="form-field">
      <label>Customer Name</label>
      <input id="customerName">
    </div>
    <div class="form-field">
      <label>Brand Name</label>
      <input id="brandName">
    </div>
    <div class="form-field">
      <label>Contact Number</label>
      <input id="contactNumber">
    </div>

    <hr>

    <h3>Cart</h3>
    <div id="popupSummary"></div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
      <button onclick="submitWhatsApp()" class="add-btn">WhatsApp</button>
      <button onclick="submitEmail()" class="add-btn">Email</button>
      <button onclick="closeSummary()" class="summary-btn">Close</button>
    </div>

  </div>
</div>

<!-- ✅ SCRIPT ORDER -->
<script src="Product.js"></script>
<script src="script.js.js"></script>

</body>
</html>
